name: Bundle Models

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. models-2025-01)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: Bundle models
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Streaming Zipformer (中文)
        run: |
          mkdir -p dist
          echo "=== Downloading Streaming Zipformer (中文) ==="
          gh release download asr-models \
            --repo k2-fsa/sherpa-onnx \
            --pattern "sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2" \
            -D /tmp/models/ 2>/dev/null || \
          curl -sSLo /tmp/models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2"
          tar xf /tmp/models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2 -C /tmp/models/
          tar czf dist/zipformer-zh.tar.gz \
            -C /tmp/models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30 .
          rm -rf /tmp/models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30 \
            /tmp/models/sherpa-onnx-streaming-zipformer-zh-int8-2025-06-30.tar.bz2
          echo "=== Size ==="
          du -sh dist/zipformer-zh.tar.gz

      - name: Package Streaming Paraformer (中英双语)
        run: |
          echo "=== Downloading Streaming Paraformer (中英双语) ==="
          curl -sSLo /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2" 2>/dev/null || \
          gh release download asr-models \
            --repo k2-fsa/sherpa-onnx \
            --pattern "sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2" \
            -D /tmp/models/
          if [ -f /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2 ]; then
            tar xf /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2 -C /tmp/models/
            tar czf dist/paraformer-bilingual-zh-en.tar.gz \
              -C /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en .
            rm -rf /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en \
              /tmp/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en.tar.bz2
          fi
          echo "=== Size ==="
          du -sh dist/paraformer-bilingual-zh-en.tar.gz 2>/dev/null || true

      - name: Package Punctuation model (中英)
        run: |
          echo "=== Downloading Punctuation model ==="
          curl -sSLo /tmp/models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8.tar.bz2 \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/punctuation-models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8.tar.bz2"
          tar xf /tmp/models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8.tar.bz2 -C /tmp/models/
          tar czf dist/punct-ct-transformer-zh-en.tar.gz \
            -C /tmp/models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8 .
          rm -rf /tmp/models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8 \
            /tmp/models/sherpa-onnx-punct-ct-transformer-zh-en-vocab272727-2024-04-12-int8.tar.bz2
          echo "=== Size ==="
          du -sh dist/punct-ct-transformer-zh-en.tar.gz

      - name: List packages
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Model Bundle ${{ inputs.version }}"
          body: |
            ## 模型资源包 ${{ inputs.version }}

            各模型独立打包，按需下载解压到 `~/.config/live.captions.gtk/models/` 即可使用。

            ### 内容

            | 模型 | 文件 | 说明 |
            |------|------|------|
            | Streaming Zipformer (中文) | `zipformer-zh.tar.gz` | ~160MB |
            | Streaming Paraformer (中英双语) | `paraformer-bilingual-zh-en.tar.gz` | ~226MB |
            | Punctuation CT-Transformer (中英) | `punct-ct-transformer-zh-en.tar.gz` | ~72MB |

            ### 使用方式

            ```bash
            # 按需下载需要的模型
            tar xzf zipformer-zh.tar.gz -C ~/.config/live.captions.gtk/models/
            tar xzf paraformer-bilingual-zh-en.tar.gz -C ~/.config/live.captions.gtk/models/
            tar xzf punct-ct-transformer-zh-en.tar.gz -C ~/.config/live.captions.gtk/models/
            ```
          files: |
            dist/zipformer-zh.tar.gz
            dist/paraformer-bilingual-zh-en.tar.gz
            dist/punct-ct-transformer-zh-en.tar.gz
